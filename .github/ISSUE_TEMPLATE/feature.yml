name: Feature proposal
description: Propose a focused, generalizable improvement
title: "[Proposal] "
labels: ["proposal"]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem, description: "What recurring user problem exists? Avoid starting with the solution." }
    validations: { required: true }
  - type: textarea
    id: outcome
    attributes: { label: Desired outcome, description: "What would become easier or safer?" }
    validations: { required: true }
  - type: textarea
    id: approach
    attributes: { label: Suggested approach }
  - type: dropdown
    id: risk
    attributes:
      label: New capability risk
      options: [No new capability, Network access, Filesystem access, Provider data, MCP/tool call, CLI/system control, Update mechanism]
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes: { label: Evidence, description: "Link related issues, examples, or measurements. Never paste private user data." }
