version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      desktop-minor:
        update-types: [minor, patch]
  - package-ecosystem: npm
    directory: /website
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      website-minor:
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly }
