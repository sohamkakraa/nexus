name: Improvement brief

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/evolution/report.mjs evolution-report.md
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('evolution-report.md', 'utf8')
            const title = 'Automated improvement brief'
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation',
              per_page: 100
            })
            const existing = issues.find(issue => issue.title === title)
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              })
            } else {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'automation',
                  color: '6759d4',
                  description: 'Generated by a privacy-safe repository automation'
                })
              } catch (error) {
                if (error.status !== 422) throw error
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['automation']
              })
            }
