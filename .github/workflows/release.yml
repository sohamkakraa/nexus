name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  macos:
    runs-on: macos-14
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test
      - name: Require signing and notarization credentials
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required; refusing to create an unsigned or unnotarized release."
              missing=1
            fi
          done
          exit "$missing"
      - name: Build release
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist
      - name: Verify signatures and notarization
        run: |
          app_path="$(find dist -type d -name 'Nexus.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          for artifact in dist/*.dmg; do
            xcrun stapler validate "$artifact"
            spctl --assess --type open --context context:primary-signature --verbose=2 "$artifact"
          done
      - name: Checksums
        run: |
          cd dist
          shasum -a 256 *.dmg *.zip > SHA256SUMS.txt
      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx > dist/nexus-sbom.cdx.json
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.dmg
            dist/*.zip
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt
            dist/nexus-sbom.cdx.json
