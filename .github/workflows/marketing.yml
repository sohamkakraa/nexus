name: Marketing brief

on:
  schedule:
    - cron: "30 9 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/marketing/plan.mjs marketing-plan.json
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const plan = JSON.parse(fs.readFileSync('marketing-plan.json', 'utf8'))
            const week = Math.min(4, Math.max(1, Math.ceil((new Date().getUTCDate()) / 7)))
            const campaign = plan.campaigns.find(item => item.week === week) ?? plan.campaigns[0]
            const body = [
              `# ${campaign.theme}`,
              '',
              'This automation never posts, creates accounts, sends messages, or spends money. Review and approve platform-native drafts manually.',
              '',
              '## Assets',
              ...campaign.assets.map(asset => `- [ ] ${asset}`),
              '',
              '## Channels',
              ...campaign.channels.map(channel => `- [ ] ${channel}`),
              '',
              `Posting cap: ${plan.maximumPostsPerWeek} per week`,
              `Paid spend: $${plan.paidSpendUsd}`,
              `Generated: ${plan.generatedAt}`
            ].join('\n')
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'campaign',
                color: 'db8063',
                description: 'Zero-cost launch campaign task'
              })
            } catch (error) {
              if (error.status !== 422) throw error
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Campaign week ${campaign.week}: ${campaign.theme}`,
              body,
              labels: ['campaign']
            })
