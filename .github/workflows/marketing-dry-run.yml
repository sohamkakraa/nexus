name: Marketing plan dry run

on:
  schedule:
    - cron: "41 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/marketing/plan.mjs marketing-plan.json
      - uses: actions/upload-artifact@v4
        with:
          name: marketing-plan-dry-run
          path: marketing-plan.json
          retention-days: 7
